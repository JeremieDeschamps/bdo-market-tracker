<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDO Price Trends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-orb orb-left"></div>
    <div class="background-orb orb-right"></div>

    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Black Desert Online</p>
            <h1>Price Movers</h1>
            <p class="subtitle">Track items going up and down by comparing the latest scan with an earlier time window.</p>
            <div class="top-nav">
                <a href="/" class="nav-link">Back To Dashboard</a>
            </div>
        </header>

        <section class="panel">
            <div class="trends-controls">
                <select id="windowSelect" aria-label="Trend window">
                    <option value="6h">Last 6 hours</option>
                    <option value="12h">Last 12 hours</option>
                    <option value="24h" selected>Last 24 hours</option>
                    <option value="72h">Last 3 days</option>
                    <option value="168h">Last 7 days</option>
                </select>
                <button id="refreshTrends" type="button">Refresh</button>
            </div>
            <p id="trendsRefreshStatus" class="refresh-status">Auto-refresh every 60s. Waiting for first refresh.</p>
            <div id="trendsStatus" class="subtitle">Loading movers...</div>
            <div class="table-wrap" style="margin-top: 12px;">
                <table>
                    <thead>
                        <tr>
                            <th>Item ID</th>
                            <th>Name</th>
                            <th>Main/Sub</th>
                            <th>Old Price</th>
                            <th>New Price</th>
                            <th data-sort="delta">Delta</th>
                            <th data-sort="deltaPct">Delta %</th>
                            <th>Stock</th>
                            <th>Scanned At</th>
                        </tr>
                    </thead>
                    <tbody id="trendsBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="trends.js"></script>
</body>
</html>
